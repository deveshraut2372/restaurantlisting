spring.application.name=restaurant-service

server.port=9091

spring.profiles.active=local

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# eureka properties

eureka.client.server-url.default-Zone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true


# Admin server client configuraion
spring.boot.admin.client.url=http://localhost:9998

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
